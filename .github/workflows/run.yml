name: FCWXTH Poster

# GitHub's scheduler is best-effort and gets throttled to ~hourly, which is far
# too slow for warnings. Work around it: each run is ONE long job that polls
# every 60s for ~5.9 hours. The schedule keeps a restart QUEUED (it never kills
# the running job — see concurrency below); pushing a code/config change to
# main restarts the loop immediately so changes go live without waiting.
on:
  schedule:
    - cron: "*/30 * * * *"   # best-effort: keep a restart queued
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Send a TEST phone alert (opens a test issue that @mentions you)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:                    # state.json commits use [skip ci] and don't match
      - post.py
      - wx_card.py
      - feeds.yaml
      - requirements.txt
      - alert.py
      - .github/workflows/run.yml

permissions:
  contents: write
  issues: write               # alert.py opens the @mention alarm issue

concurrency:
  group: fcwxth-poster
  # Scheduled runs QUEUE behind the current job instead of cancelling it —
  # a mid-flight kill between "posted to Facebook" and "pushed state.json"
  # would repost those items on the next run. Pushes and manual dispatches DO
  # cancel (an intentional restart to pick up new code right away).
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 358      # just under GitHub's 360-min job cap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Ensure DejaVu font for the conditions card
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core

      - name: Poll every 60 seconds
        env:
          FB_TOKEN_FCWXTH: ${{ secrets.FB_TOKEN_FCWXTH }}
          FB_TOKEN_PVFD:   ${{ secrets.FB_TOKEN_PVFD }}
          NASA_API_KEY:    ${{ secrets.NASA_API_KEY }}
          WU_API_KEY:      ${{ secrets.WU_API_KEY }}
          GH_TOKEN:        ${{ github.token }}
        run: |
          git config user.name  "fcwxth-poster-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ "${{ inputs.test_alert }}" = "true" ]; then
            python alert.py --test || true
          fi
          had_failures=0
          end=$((SECONDS + 21240))      # ~5.9 hours, then let the schedule restart
          while [ $SECONDS -lt $end ]; do
            if ! python post.py; then
              echo "::warning::post.py reported failures this cycle (expired token? API down?)"
              if [ "$had_failures" = "0" ]; then
                # instant phone alarm on the FIRST failure of this job — an
                # @mention issue pushes to GitHub Mobile within ~a minute
                python alert.py || true
              fi
              had_failures=1
            fi
            if ! git diff --quiet -- state.json; then
              git add state.json
              git commit -m "update state [skip ci]" >/dev/null 2>&1 || true
              git pull --rebase --autostash -q origin main >/dev/null 2>&1 || true
              git push -q origin main >/dev/null 2>&1 || \
                echo "::warning::git push failed — state not saved to GitHub this cycle"
            fi
            sleep 60
          done
          # Fail the job at the end of the window so GitHub sends a failure
          # notification — otherwise an expired token could go unnoticed for weeks.
          if [ "$had_failures" = "1" ]; then
            echo "::error::One or more cycles had posting failures — check the warnings above and the FB tokens."
            exit 1
          fi
