# =====================================================================
# FCWXTH Poster — replacement config for 54 IFTTT applets
# Harvested from ifttt.com/my_applets (account: sawmantim) 2026-06-20
#
# Facebook Pages (Graph API page IDs):
#   FCWXTH = 423771745  (Franklin County Weather with Tim Haithcock)
#   PVFD   = 425720166  (Paden Fire & Rescue)
#   (AST and MSST intentionally DROPPED per user)
#
# Template tokens: {title}{content}{url}{image} map to the old IFTTT
#   ingredients EntryTitle / EntryContent / EntryUrl / EntryImageUrl.
# =====================================================================

pages:
  # Real Facebook Graph Page IDs (confirmed via Graph API /me/accounts 2026-06-20).
  # NOTE: IFTTT used different internal IDs (423771745 / 425720166) — do not use those.
  FCWXTH: "103994271809938"   # Franklin County Weather with Tim Haithcock
  PVFD:   "254298421099827"   # Paden Fire & Rescue

defaults:
  poll_interval_minutes: 10
  attach_image: true          # IFTTT could NOT do this; Graph API can

