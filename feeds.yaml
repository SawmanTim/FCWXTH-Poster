# ---------------------------------------------------------------------
# GROUP E — Weather-condition & sunrise/sunset posts (event-triggered)
#   Replaces the old IFTTT "Weather Underground" applets. Current conditions
#   and temperature come from the nearest NWS station; sun times from astral.
#   Triggers are EDGE-based: "condition:Rain" posts when it STARTS raining,
#   "temp_above:100" when temp crosses up through 100F, "sunset" once per day.
#   Cold has two tiers: temp_below:32 (freezing/frost) and temp_below:20
#   (extreme cold / drip-your-faucets). Each fires once per downward crossing.
#   Tokens: {time} {condition} {tempF} {sunset} {sunrise}
# ---------------------------------------------------------------------
weather_locations:
  Paden:
    lat: 34.69
    lon: -88.30
    tz: "America/Chicago"
    page: PVFD
  Franklin:                       # Franklin County, AL — sampled at Russellville
    lat: 34.51
    lon: -87.73
    tz: "America/Chicago"
    page: FCWXTH

weather_condition_posts:
  - {loc: Paden,    trigger: "condition:Rain", template: "On {time} {condition} was observed in Paden, Mississippi."}
  - {loc: Paden,    trigger: "condition:Snow", template: "On {time} {condition} was observed in Paden, Mississippi."}
  - {loc: Paden,    trigger: "temp_above:100", template: "On {time}, a Temperature of {tempF} Degrees was Observed in Paden, Mississippi."}
  - {loc: Paden,    trigger: "temp_below:32",  template: "🥶 FREEZING — On {time}, the temperature reached {tempF}°F in Paden, Mississippi.\nWatch for frost and icy spots; bring in tender plants and outdoor pets."}
  - {loc: Paden,    trigger: "temp_below:20",  template: "❄️ EXTREME COLD — On {time}, the temperature dropped to {tempF}°F in Paden, Mississippi.\nAt 20° and below, pipes can freeze — let your faucets drip, and protect pets, plants, and exposed plumbing."}
  - {loc: Paden,    trigger: "sunset",         template: "The sun will set this evening at {sunset}. Then the sun will rise again, Lord willing, at {sunrise} in Paden, Mississippi."}
  # Franklin SNOW stays on NWS (a personal gauge can't tell precip type); sunset is
  # astronomical. Franklin RAIN + all temperature/heat/cold posts now come from the
  # personal station (KALPHILC8) — see the `station` block below.
  - {loc: Franklin, trigger: "condition:Snow", template: "At {time} {condition} was observed in Franklin County, Alabama."}
  - {loc: Franklin, trigger: "sunset",         template: "The sun will set this evening at {sunset}. Then the sun will rise again, Lord willing, at {sunrise} in Franklin County, Alabama."}

# ---------------------------------------------------------------------
# PERSONAL WEATHER STATION — KALPHILC8 (Weather Underground), at Tim's house in
# Phil Campbell, Franklin Co. AL. Source for: the hourly conditions graphic, rain
# onset, the 32°/20° cold milestones, and the NWS-Huntsville heat/cold reinforcing
# alerts. All posts -> FCWXTH and attributed to the station. Needs secret WU_API_KEY.
# HUN criteria: Heat Advisory = HI 105-109 or temp 100-104; Excessive Heat Warning =
# HI >=110 or temp >=105; Cold Weather Advisory = temp/feels +5F or below; Extreme
# Cold Warning = temp/feels -6F or below. (32/20 are local frost/pipe milestones.)
# ---------------------------------------------------------------------
station:
  station_id: KALPHILC8
  name: "Franklin County Weather with Tim Haithcock"
  location: "Franklin County, Alabama"
  tz: "America/Chicago"
  page: FCWXTH
  hourly_card: true     # post the conditions graphic on the hour, every hour
  rain: true            # post when rain first begins (precipRate > 0)
  attribution: 'Observed at our station "Franklin County Weather with Tim Haithcock" (KALPHILC8), Phil Campbell, AL.'
  messages:
    rain: "🌧️ RAIN is now falling at our station in {location}.\nDrive with caution and watch for ponding on roadways."
    freezing: "🥶 FREEZING — {tempF}°F at our station in {location}.\nWatch for frost and icy spots on roads and walkways, bring in tender plants and outdoor pets, and dress in warm layers."
    dangerous_cold: "❄️ DANGEROUS COLD — {tempF}°F at our station in {location}.\nAt 20° and below, pipes can freeze — let your faucets drip, and protect pets, plants, and exposed plumbing."
    cold_advisory: "🥶 COLD WEATHER ADVISORY CONDITIONS — feels like {feelsF}°F at our station in {location}.\nCold temperatures can cause hypothermia and frostbite. Dress in warm layers, cover exposed skin, bring pets indoors, and check on the elderly and anyone without adequate heat. Let faucets drip to protect pipes."
    extreme_cold: "❄️ EXTREME COLD WARNING CONDITIONS — feels like {feelsF}°F at our station in {location}.\nDangerously cold. Frostbite can occur on exposed skin within minutes and hypothermia can be life-threatening. Avoid going outside; if you must, wear a hat, gloves, and layers. Bring pets indoors, protect plumbing, and use heaters safely — never use a stove, oven, or generator indoors for heat."
    heat_advisory: "🥵 HEAT ADVISORY CONDITIONS — {tempF}°F, feels like {feelsF}°F at our station in {location}.\nDrink plenty of fluids, stay in air conditioning when you can, stay out of the sun, and check on relatives, neighbors, the elderly, and pets. Never leave children or pets in a parked vehicle. Take extra care if you work or spend time outside."
    heat_warning: "🔥 EXCESSIVE HEAT WARNING CONDITIONS — {tempF}°F, feels like {feelsF}°F at our station in {location}.\nDangerous heat. Avoid the sun and strenuous activity during the heat of the day, drink plenty of water, and stay in air conditioning. Check on the elderly, the sick, and those without AC. NEVER leave children or pets in a vehicle — interior temperatures turn deadly within minutes. Heat stroke is an emergency — call 911."

# ---------------------------------------------------------------------
# EXTRAS — engagement & science content (all free/official, no RSS.app slots)
# ---------------------------------------------------------------------
nasa_apod:                       # daily NASA Astronomy Picture of the Day
  pages: [FCWXTH]
  prefix: "NASA Astronomy Picture of the Day"
  # needs a free NASA API key as secret NASA_API_KEY (get one at api.nasa.gov).
  # Falls back to the shared DEMO_KEY if unset (rate-limited).

swpc_space_weather:              # NOAA space weather: geomagnetic storms / aurora / blackouts
  pages: [FCWXTH]
  aurora_image: "https://services.swpc.noaa.gov/images/aurora-forecast-northern-hemisphere.jpg"

usdm_drought:                    # weekly U.S. Drought Monitor (released Thursdays)
  pages: [FCWXTH]
  # One post + state map each, for our 3-state coverage area. {state} fills in below.
  states:
    - {name: Alabama,     image: "https://droughtmonitor.unl.edu/data/png/current/current_al_trd.png"}
    - {name: Mississippi, image: "https://droughtmonitor.unl.edu/data/png/current/current_ms_trd.png"}
    - {name: Tennessee,   image: "https://droughtmonitor.unl.edu/data/png/current/current_tn_trd.png"}
  text: "U.S. Drought Monitor — this week's update for {state}.\nUpdated every Thursday by the National Drought Mitigation Center, USDA & NOAA."

spc_mesoscale:                   # SPC Mesoscale Discussions that mention our area
  feed: "https://www.spc.noaa.gov/products/spcmdrss.xml"
  pages: [FCWXTH]
  prefix: "***SPC MESOSCALE DISCUSSION***"
  match: [Alabama, Tennessee, Mississippi, AL, TN, MS]

