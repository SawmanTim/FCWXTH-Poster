# ---------------------------------------------------------------------
# GROUP B — Official direct feeds (no RSS.app needed)
# ---------------------------------------------------------------------
official_feeds:
  - name: "Atlantic Basin Tropical Cyclones (NHC)"
    url: "https://www.nhc.noaa.gov/index-at.xml"
    pages: [FCWXTH]
    clean: nws            # strip WMO/AWIPS headers + $$ footer
    image: "https://www.nhc.noaa.gov/xgtwo/two_atl_7d0.png"  # attach the 7-day outlook map
    skip_title_contains: "no tropical cyclones"   # skip the redundant quiet-season status line
    template: "***NHC TROPICAL ALERT***\n\n{content}"

# ---------------------------------------------------------------------
# GROUP C — IEM office "chat" feeds  *** DISABLED 2026-06-21 ***
#   These dumped raw product text (LAT/LON, MOT, &&, $$) and posted the IEM
#   map as a non-rendering LINK, and duplicated the clean county-alert system
#   (Group D), which already covers every warning for the 27 counties with the
#   map attached as a real image. Renamed the key to switch them OFF (the code
#   reads "iem_office_feeds"; this won't be picked up). Rename back to re-enable.
# ---------------------------------------------------------------------
iem_office_feeds_disabled:
  - name: "NWS HUN (Huntsville)"
    url: "https://weather.im/iembot-rss/room/hunchat.xml"
    pages: [FCWXTH]
    match_any: [Colbert, Cullman, Fayette, Franklin, Lamar, Lauderdale, Lawrence, Limestone, Marion, Morgan, Walker, Winston, Giles]
    template: "***NWS ALERT for your LOCATION***\n{title} {content} {url} {image}"
  - name: "NWS MEG (Memphis)"
    url: "https://weather.im/iembot-rss/room/megchat.xml"
    pages: [FCWXTH]
    match_any: [Alcorn, Chickasaw, Itawamba, Lee, Monroe, Pontotoc, Prentiss, Tippah, Union, Tishomingo]
    template: "***NWS ALERT for your LOCATION***\n{title} {content} {url} {image}"
  - name: "NWS BMX (Birmingham)"
    url: "https://weather.im/iembot-rss/room/bmxchat.xml"
    pages: [FCWXTH]
    match_any: [Colbert, Cullman, Fayette, Franklin, Lamar, Lauderdale, Lawrence, Limestone, Marion, Morgan, Walker, Winston]
    template: "***NWS ALERT for your LOCATION***\n{title} {content} {url} {image}"
