# ---------------------------------------------------------------------
# GROUP G — Community Service Alerts: state-wide NON-weather emergencies
#   AMBER (Child Abduction), Blue Alert, law-enforcement, civil/local
#   emergency, evacuation, shelter-in-place, HazMat, 911 outage, etc.
#   Pulled from NWS per state and filtered to these event types only
#   (weather is handled by the county feeds, so it's excluded here).
# ---------------------------------------------------------------------
community_service_alerts:
  states: [AL, TN, MS]
  pages: [FCWXTH, PVFD]
  events:
    - "Child Abduction Emergency"     # AMBER
    - "Blue Alert"
    - "Law Enforcement Warning"
    - "Civil Emergency Message"
    - "Local Area Emergency"
    - "Evacuation Immediate"
    - "Shelter In Place Warning"
    - "911 Telephone Outage Emergency"
    - "Hazardous Materials Warning"
    - "Nuclear Power Plant Warning"
    - "Radiological Hazard Warning"
    - "Fire Warning"

# ---------------------------------------------------------------------
# GROUP E — Weather-condition & sunrise/sunset posts (event-triggered)
#   Replaces the old IFTTT "Weather Underground" applets. Current conditions
#   and temperature come from the nearest NWS station; sun times from astral.
#   Triggers are EDGE-based: "condition:Rain" posts when it STARTS raining,
#   "temp_above:99" when temp crosses up through 99F, "sunset" once per day.
#   Tokens: {time} {condition} {tempF} {sunset} {sunrise}
# ---------------------------------------------------------------------
weather_locations:
  Paden:
    lat: 34.69
    lon: -88.30
    tz: "America/Chicago"
    page: PVFD
  Franklin:                       # Franklin County, AL — sampled at Russellville
    lat: 34.51
    lon: -87.73
    tz: "America/Chicago"
    page: FCWXTH

weather_condition_posts:
  - {loc: Paden,    trigger: "condition:Rain", template: "On {time} {condition} was observed in Paden, Mississippi."}
  - {loc: Paden,    trigger: "condition:Snow", template: "On {time} {condition} was observed in Paden, Mississippi."}
  - {loc: Paden,    trigger: "temp_above:99",  template: "On {time}, a Temperature of {tempF} Degrees was Observed in Paden, Mississippi."}
  - {loc: Paden,    trigger: "temp_below:32",  template: "On {time}, a Temperature of {tempF} Degrees was Observed in Paden, Mississippi."}
  - {loc: Paden,    trigger: "sunset",         template: "The sun will set this evening at {sunset}. Then the sun will rise again, Lord willing, at {sunrise} in Paden, Mississippi."}
  - {loc: Franklin, trigger: "condition:Snow", template: "At {time} {condition} was observed in Franklin County, Alabama."}
  - {loc: Franklin, trigger: "condition:Rain", template: "On {time}, {condition} was observed in Franklin County, Alabama."}
  - {loc: Franklin, trigger: "temp_above:99",  template: "On {time}, a Temperature of {tempF} Degrees was Observed in Franklin County, Alabama."}
  - {loc: Franklin, trigger: "temp_below:32",  template: "On {time}, a Temperature of {tempF} Degrees was Observed in Franklin County, Alabama."}
  - {loc: Franklin, trigger: "sunset",         template: "The sun will set this evening at {sunset}. Then the sun will rise again, Lord willing, at {sunrise} in Franklin County, Alabama."}

