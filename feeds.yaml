# ---------------------------------------------------------------------
# GROUP E — Weather-condition / sunrise posts (NOT feed-driven)
#   Old trigger = Weather Underground style. Needs a weather-data source
#   (e.g. NWS api point forecast / observations) instead of RSS.
# ---------------------------------------------------------------------
weather_condition_posts:
  - {name: "Paden rain",      page: PVFD,   location: "Paden, Mississippi",        trigger: "condition_is:Rain",   template: "On {time} {condition} was observed in Paden, Mississippi. Provided by your #PVFRD & #FCWXTH Staff."}
  - {name: "Paden snow",      page: PVFD,   location: "Paden, Mississippi",        trigger: "condition_is:Snow",   template: "On {time} {condition} was observed in Paden, Mississippi. Provided by your #PVFRD & #FCWXTH Staff."}
  - {name: "Paden temp>99",   page: PVFD,   location: "Paden, Mississippi",        trigger: "temp_above:99F",      template: "On {time}, a Temperature of {tempF} Degrees was Observed in Paden, Mississippi. Provided by your #PVFRD & #FCWXTH Staff."}
  - {name: "Paden temp<32",   page: PVFD,   location: "Paden, Mississippi",        trigger: "temp_below:32F",      template: "On {time}, a Temperature of {tempF} Degrees was Observed in Paden, Mississippi. Provided by your #PVFRD & #FCWXTH Staff."}
  - {name: "Paden sun",       page: PVFD,   location: "Paden, Mississippi",        trigger: "civil_sunset",        template: "The sun will set this evening {sunset}. Then the sun will rise again, Lord willing, {sunrise} in Paden, Mississippi. Provided by your #PVFRD & #FCWXTH Staff."}
  - {name: "Franklin snow",   page: FCWXTH, location: "Franklin County, Alabama",  trigger: "condition_is:Snow",   template: "At {time} {condition} was observed in Franklin County."}
  - {name: "Franklin rain",   page: FCWXTH, location: "Franklin County, Alabama",  trigger: "condition_is:Rain",   template: "On {time}, {condition} was observed in Franklin County, Alabama."}
  - {name: "Franklin temp>99",page: FCWXTH, location: "Franklin County, Alabama",  trigger: "temp_above:99F",      template: "On {time}, a Temperature of {tempF} Degrees was Observed in Franklin County, Alabama."}
  - {name: "Franklin temp<32",page: FCWXTH, location: "Franklin County, Alabama",  trigger: "temp_below:32F",      template: "On {time}, a Temperature of {tempF} Degrees was Observed in Franklin County, Alabama."}
  - {name: "Franklin sun",    page: FCWXTH, location: "Franklin County, Alabama",  trigger: "civil_sunset",        template: "The sun will set this evening {sunset}. Then the sun will rise again, Lord willing, {sunrise} in Franklin County."}

